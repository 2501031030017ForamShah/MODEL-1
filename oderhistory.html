<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History</title>

    <link rel="stylesheet" href="oderhistory.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="header.css">
</head>

<body>

    <div class="history-container">

        <h1>Order History</h1>

        <div class="order-card">

            <div class="order-info">
                <h2>BMW X5</h2>
                <p>Order ID: #1001</p>
                <p>Date: 14 May 2026</p>
            </div>

            <div class="order-status delivered">
                Delivered
            </div>

        </div>

        <div class="order-card">

            <div class="order-info">
                <h2>Audi R8</h2>
                <p>Order ID: #1002</p>
                <p>Date: 10 May 2026</p>
            </div>

            <div class="order-status pending">
                Pending
            </div>

        </div>

        <div class="order-card">

            <div class="order-info">
                <h2>Mercedes G-Class</h2>
                <p>Order ID: #1003</p>
                <p>Date: 05 May 2026</p>
            </div>

            <div class="order-status cancelled">
                Cancelled
            </div>

        </div>

    </div>

</body>

</html>
