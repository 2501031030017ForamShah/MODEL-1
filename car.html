<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cars - Car World</title>

  <link rel="stylesheet" href="car.css">
</head>

<body>
<div id="hedar"></div>

  <script src="hedar.js"></script>

  <!-- HEADER -->

  <section class="gallery">

    <h2>Our Car Collection</h2>

    <div class="car-container">

      <!-- CAR 1 -->
      <div class="car-card">
        <img src="image/sports_car.jpg" alt="Sports Car">
        <h3>Sports Car</h3>
        <p>High speed and stylish design for performance lovers.</p>
      </div>

      <!-- CAR 2 -->
      <div class="car-card">
        <img src="image/luxurious_car.jpg" alt="Luxury Car">
        <h3>Luxury Car</h3>
        <p>Premium comfort with top-class interior experience.</p>
      </div>

      <!-- CAR 3 -->
      <div class="car-card">
        <img src="image/suv_car.jpg" alt="SUV Car">
        <h3>SUV</h3>
        <p>Powerful SUV for all terrains and long drives.</p>
      </div>

      <!-- CAR 4 -->
      <div class="car-card">

        <img src="image/super_car.jpg" alt="Super Car">
        <h3>Super Car</h3>
        <p>Extreme performance with futuristic design.</p>
      </div>

    </div>

  </section>

  <!-- FOOTER -->
