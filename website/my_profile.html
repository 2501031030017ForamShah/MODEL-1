<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Car World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding-top: 60px;">

    <div id="header-placeholder"></div>

    <div class="container mt-5 pt-4 min-vh-100">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 text-center">
                    <img src="https://via.placeholder.com/150" alt="Profile Picture" class="rounded-circle mx-auto mb-3" style="width: 150px; border: 3px solid var(--primary-color);">
                    <h3 class="text-warning">John Doe</h3>
                    <p class="text-muted">johndoe@example.com</p>
                    <p class="text-muted">Member since: 2024</p>
                    <hr class="border-secondary">
                    <div class="d-grid gap-2">
                        <a href="order_history.html" class="btn btn-outline-light">View Order History</a>
                        <button class="btn btn-outline-danger" onclick="alert('Logged Out!'); window.location.href='login.html';">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button id="scrollTopBtn" title="Go to top">↑</button>
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
