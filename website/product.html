<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Car World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="product-page" style="padding-top: 60px;">

    <div id="header-placeholder"></div>

    <div class="container mt-5 pt-4">
        <h2 class="text-center mb-5 text-warning">All Products</h2>
        
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <label class="text-light me-2">Category:</label>
                <select id="catFilter" class="form-select d-inline-block w-auto bg-dark text-light border-secondary" onchange="filterAndSort()">
                    <option value="all">All</option>
                    <option value="sports">Sports</option>
                    <option value="luxury">Luxury</option>
                    <option value="suv">SUV</option>
                    <option value="classic">Classic</option>
                    <option value="electric">Electric</option>
                    <option value="convertible">Convertible</option>
                </select>
            </div>
            <div>
                <label class="text-light me-2">Sort By:</label>
                <select id="priceSort" class="form-select d-inline-block w-auto bg-dark text-light border-secondary" onchange="filterAndSort()">
                    <option value="default">Default</option>
                    <option value="low">Price: Low to High</option>
                    <option value="high">Price: High to Low</option>
                </select>
            </div>
        </div>
        
        <div class="row g-4" id="productRow">
            <!-- Normal Items -->
            <div class="col-md-4 product-wrapper" data-category="sports" data-price="85000">
                <div class="card">
                    <img src="../image/sports_car.jpg" class="card-img-top" alt="Sports Car" onerror="this.src='https://via.placeholder.com/400x250?text=Sports+Car'">
                    <div class="card-body">
                        <h5 class="card-title">Sports Car</h5>
                        <p class="price h5 text-warning">₹85,000</p>
                        <a href="prod_detail.html?car=sports" class="text-warning d-block mb-3">View Details</a>

                        <button class="btn btn-primary w-100" onclick="addToCart(this)">Add To Cart</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 product-wrapper" data-category="luxury" data-price="120000">
                <div class="card">
                    <img src="../image/luxurious_car.jpg" class="card-img-top" alt="Luxury Car" onerror="this.src='https://via.placeholder.com/400x250?text=Luxury+Car'">
                    <div class="card-body">
                        <h5 class="card-title">Luxury Car</h5>
                        <p class="price h5 text-warning">₹120,000</p>
                        <a href="prod_detail.html?car=luxury" class="text-warning d-block mb-3">View Details</a>
                        
                        <button class="btn btn-primary w-100" onclick="addToCart(this)">Add To Cart</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 product-wrapper" data-category="suv" data-price="65000">
                <div class="card">
                    <img src="../image/suv_car.jpg" class="card-img-top" alt="SUV" onerror="this.src='https://via.placeholder.com/400x250?text=SUV'">
                    <div class="card-body">
                        <h5 class="card-title">SUV Car</h5>
                        <p class="price h5 text-warning">₹65,000</p>
                        <a href="prod_detail.html?car=suv" class="text-warning d-block mb-3">View Details</a>
                       
                        <button class="btn btn-primary w-100" onclick="addToCart(this)">Add To Cart</button>
                    </div>
                </div>
            </div>

            <!-- Extra items hidden by default -->
            <div class="col-md-4 extra-item product-wrapper" data-category="classic" data-price="150000" style="display: none;">
                <div class="card">
                    <img src="../image/Classic_car.jpg" class="card-img-top" alt="Classic Car" onerror="this.src='https://via.placeholder.com/400x250?text=Classic+Car'">
                    <div class="card-body">
                        <h5 class="card-title">Classic Car</h5>
                        <p class="price h5 text-warning">₹150,000</p>
                        <a href="prod_detail.html?car=classic" class="text-warning d-block mb-3">View Details</a>
                        
                        
                        <button class="btn btn-primary w-100" onclick="addToCart(this)">Add To Cart</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 extra-item product-wrapper" data-category="electric" data-price="90000" style="display: none;">
                <div class="card">
                    <img src="../image/Electric_car.jpg" class="card-img-top" alt="Electric Car" onerror="this.src='https://via.placeholder.com/400x250?text=Electric+Car'">
                    <div class="card-body">
                        <h5 class="card-title">Electric Car</h5>
                        <p class="price h5 text-warning">₹90,000</p>
                        <a href="prod_detail.html?car=electric" class="text-warning d-block mb-3">View Details</a>
                        
                        <button class="btn btn-primary w-100" onclick="addToCart(this)">Add To Cart</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 extra-item product-wrapper" data-category="convertible" data-price="110000" style="display: none;">
                <div class="card">
                    <img src="../image/Convertible_car.jpg" class="card-img-top" alt="Convertible Car" onerror="this.src='https://via.placeholder.com/400x250?text=Convertible'">
                    <div class="card-body">
                        <h5 class="card-title">Convertible Car</h5>
                        <p class="price h5 text-warning">₹110,000</p>
                        <a href="prod_detail.html?car=convertible" class="text-warning d-block mb-3">View Details</a>
                        
                        <button class="btn btn-primary w-100" onclick="addToCart(this)">Add To Cart</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4 mb-5">
            <button id="loadMoreBtn" class="btn btn-outline-warning btn-lg" onclick="loadMore()">Load More 🚗</button>
        </div>
    </div>

    <!-- Scroll To Top Button -->
    <button id="scrollTopBtn" title="Go to top">↑</button>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
