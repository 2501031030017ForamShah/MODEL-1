<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Practice - Car World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding-top: 80px;">

    <div id="header-placeholder"></div>

    <div class="container min-vh-100">
        <h2 class="text-center text-warning mb-4">DOM Manipulation Demo (Car Customizer)</h2>
        
        <div class="card p-4">
            <h3 id="carTitle" class="text-white">Standard Edition Car</h3>
            
            <div id="featuresContainer" class="mt-3">
                <p id="defaultFeature" class="text-white">🔹 Feature: Standard Alloy Wheels</p>
                <p id="oldFeature" class="text-white">🔹 Feature: Basic Radio (Click remove to delete me)</p>
            </div>

            <div class="mt-4">
                <h5 class="text-white">Select Accessories (Checkboxes):</h5>
                <div id="accessoriesContainer">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="accessory" id="acc1" value="Leather Seats">
                        <label class="form-check-label text-white" for="acc1">Leather Seats</label>
                    </div>
                </div>
            </div>

            <hr class="border-secondary my-4">

            <h5 class="text-warning mb-3">Interactive Controls (JS Actions):</h5>
            <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-outline-success" onclick="addElement()">Add Element (New &lt;p&gt;)</button>
                
                <button class="btn btn-outline-info" onclick="changeValue()">Change Value (Title)</button>
                
                <button class="btn btn-outline-danger" onclick="removeElement()">Remove Element</button>
                
                <button class="btn btn-outline-warning" onclick="addCheckboxOption()">Add Checkbox Option</button>
            </div>
        </div>
    </div>

    <button id="scrollTopBtn" title="Go to top">↑</button>
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
    
    <script>
        // 1. Add Element (e.g. p tag)
        function addElement() {
            // Create new <p> tag
            const newP = document.createElement("p");
            // Added dynamic-feature class to help track newly created tags
            newP.className = "text-white fw-bold dynamic-feature";
            newP.innerText = "🔹 New Feature: Panoramic Sunroof Added!";
            
            // Append to container
            document.getElementById("featuresContainer").appendChild(newP);
        }

        // 2. Change Value (Toggles back and forth every time you click)
        function changeValue() {
            const titleElement = document.getElementById("carTitle");
            
            // Read current text content to switch states back and forth seamlessly
            if (titleElement.innerText === "Standard Edition Car") {
                titleElement.innerText = "Premium Luxury Edition Car 🏆";
                titleElement.classList.remove("text-white");
                titleElement.classList.add("text-warning");
            } else {
                titleElement.innerText = "Standard Edition Car";
                titleElement.classList.remove("text-warning");
                titleElement.classList.add("text-white");
            }
        }

        // 3. Remove Element (Removes old feature OR sequentially pops newly added features)
        function removeElement() {
            const oldFeature = document.getElementById("oldFeature");
            
            if (oldFeature) {
                // If the original basic radio feature is still there, remove it first
                oldFeature.remove();
                alert("Old feature removed successfully!");
            } else {
                // Otherwise, look for the newly added dynamic features
                const container = document.getElementById("featuresContainer");
                const dynamicFeatures = container.getElementsByClassName("dynamic-feature");
                
                if (dynamicFeatures.length > 0) {
                    // Remove the very last feature that was added to the stack
                    dynamicFeatures[dynamicFeatures.length - 1].remove();
                } else {
                    alert("All removable elements are already gone!");
                }
            }
        }

        // 4. Add option in radio/checkbox
        let optionCount = 2;
        function addCheckboxOption() {
            const container = document.getElementById("accessoriesContainer");
            
            // Create outer div
            const div = document.createElement("div");
            div.className = "form-check";

            // Create input checkbox
            const input = document.createElement("input");
            input.className = "form-check-input";
            input.type = "checkbox";
            input.name = "accessory";
            input.id = "acc" + optionCount;
            input.value = "Custom Accessory " + optionCount;

            // Create label
            const label = document.createElement("label");
            label.className = "form-check-label text-white fw-bold";
            label.setAttribute("for", input.id);
            label.innerText = "New Dynamic Option " + optionCount;

            // Append input and label to div
            div.appendChild(input);
            div.appendChild(label);

            // Append div to container
            container.appendChild(div);
            
            optionCount++;
        }
    </script>
</body>
</html>
