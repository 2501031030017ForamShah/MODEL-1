<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Practice - Car World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding-top: 80px;">

    <div id="header-placeholder"></div>

    <div class="container min-vh-100">
        <h2 class="text-center text-warning mb-4">DOM Manipulation Demo (Car Customizer)</h2>
        
        <div class="card p-4">
            <h3 id="carTitle" class="text-light">Standard Edition Car</h3>
            
            <div id="featuresContainer" class="mt-3">
                <p id="defaultFeature" class="text-muted">🔹 Feature: Standard Alloy Wheels</p>
                <p id="oldFeature" class="text-muted">🔹 Feature: Basic Radio (Click remove to delete me)</p>
            </div>

            <div class="mt-4">
                <h5 class="text-light">Select Accessories (Checkboxes):</h5>
                <div id="accessoriesContainer">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="accessory" id="acc1" value="Leather Seats">
                        <label class="form-check-label text-muted" for="acc1">Leather Seats</label>
                    </div>
                </div>
            </div>

            <hr class="border-secondary my-4">

            <h5 class="text-warning mb-3">Interactive Controls (JS Actions):</h5>
            <div class="d-flex flex-wrap gap-2">
                <!-- 1. Add Element -->
                <button class="btn btn-outline-success" onclick="addElement()">Add Element (New &lt;p&gt;)</button>
                
                <!-- 2. Change Value -->
                <button class="btn btn-outline-info" onclick="changeValue()">Change Value (Title)</button>
                
                <!-- 3. Remove Element -->
                <button class="btn btn-outline-danger" onclick="removeElement()">Remove Element</button>
                
                <!-- 4. Add Option (Checkbox) -->
                <button class="btn btn-outline-warning" onclick="addCheckboxOption()">Add Checkbox Option</button>
            </div>
        </div>
    </div>

    <button id="scrollTopBtn" title="Go to top">↑</button>
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
    
    <!-- DOM Manipulation Script -->
    <script>
        // 1. Add Element (e.g. p tag)
        function addElement() {
            // Create new <p> tag
            const newP = document.createElement("p");
            newP.className = "text-success fw-bold";
            newP.innerText = "🔹 New Feature: Panoramic Sunroof Added!";
            
            // Append to container
            document.getElementById("featuresContainer").appendChild(newP);
        }

        // 2. Change Value
        function changeValue() {
            // Get element and change its innerText
            const titleElement = document.getElementById("carTitle");
            titleElement.innerText = "Premium Luxury Edition Car 🏆";
            titleElement.classList.replace("text-light", "text-warning");
        }

        // 3. Remove Element
        function removeElement() {
            // Find element and remove it
            const oldFeature = document.getElementById("oldFeature");
            if (oldFeature) {
                oldFeature.remove();
                alert("Old feature removed successfully!");
            } else {
                alert("Element already removed.");
            }
        }

        // 4. Add option in radio/checkbox
        let optionCount = 2;
        function addCheckboxOption() {
            const container = document.getElementById("accessoriesContainer");
            
            // Create outer div
            const div = document.createElement("div");
            div.className = "form-check";

            // Create input checkbox
            const input = document.createElement("input");
            input.className = "form-check-input";
            input.type = "checkbox";
            input.name = "accessory";
            input.id = "acc" + optionCount;
            input.value = "Custom Accessory " + optionCount;

            // Create label
            const label = document.createElement("label");
            label.className = "form-check-label text-success fw-bold";
            label.setAttribute("for", input.id);
            label.innerText = "New Dynamic Option " + optionCount;

            // Append input and label to div
            div.appendChild(input);
            div.appendChild(label);

            // Append div to container
            container.appendChild(div);
            
            optionCount++;
        }
    </script>
</body>
</html>
