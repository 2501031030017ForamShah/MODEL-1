<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Car World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding-top: 60px;">

    <div id="header-placeholder"></div>

    <div class="container mt-5 pt-4 min-vh-100">
        <h2 class="text-center mb-4 text-warning">Your Shopping Cart</h2>
        
        <div class="row justify-content-center">
            <div class="col-md-8" id="cartItems">
                <!-- Cart items rendered by main.js -->
            </div>
        </div>

        <div class="text-center mt-4 mb-5">
            <a href="product.html" class="btn btn-outline-light me-2">Continue Shopping</a>
            <a href="pyment.html" class="btn btn-primary" onclick="if(getCart().length===0){alert('Cart empty!'); return false;}">Proceed to Checkout</a>
        </div>
    </div>


    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
