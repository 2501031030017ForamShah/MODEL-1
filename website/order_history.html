<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - Car World</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding-top: 60px;">

    <div id="header-placeholder"></div>

    <div class="container mt-5 pt-4 min-vh-100">
        <h2 class="text-center mb-4 text-warning">Your Order History</h2>
        
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title text-light">Order #1024</h5>
                <p class="text-muted mb-1">Date: May 12, 2026</p>
                <p class="text-muted mb-2">Total: <strong class="text-warning">₹85,000</strong></p>
                <span class="badge bg-success">Delivered</span>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title text-light">Order #1035</h5>
                <p class="text-muted mb-1">Date: May 18, 2026</p>
                <p class="text-muted mb-2">Total: <strong class="text-warning">₹120,000</strong></p>
                <span class="badge bg-warning text-dark">Processing</span>
            </div>
        </div>
    </div>

    <button id="scrollTopBtn" title="Go to top">↑</button>
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
