<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>FAQ Page</title>

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- CSS -->

    <link rel="stylesheet"
          href="faq.css">

</head>

<body>


<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand"
           href="#">

            Car World 🚗

        </a>

    </div>

</nav>



<!-- FAQ SECTION -->

<div class="container faq-section">


    <h1 class="text-center mb-5">

        Frequently Asked Questions ❓

    </h1>



    <!-- ACCORDION -->

    <div class="accordion"
         id="faqBox">


        <!-- QUESTION 1 -->

        <div class="accordion-item">

            <h2 class="accordion-header">

                <button class="accordion-button"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#q1">

                    Which cars are available?

                </button>

            </h2>

            <div id="q1"
                 class="accordion-collapse collapse show"
                 data-bs-parent="#faqBox">

                <div class="accordion-body">

                    Sports, Luxury, SUV and Electric cars are available.

                </div>

            </div>

        </div>



        <!-- QUESTION 2 -->

        <div class="accordion-item">

            <h2 class="accordion-header">

                <button class="accordion-button collapsed"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#q2">

                    Do you provide delivery service?

                </button>

            </h2>

            <div id="q2"
                 class="accordion-collapse collapse"
                 data-bs-parent="#faqBox">

                <div class="accordion-body">

                    Yes, fast and secure delivery service is available.

                </div>

            </div>

        </div>



        <!-- QUESTION 3 -->

        <div class="accordion-item">

            <h2 class="accordion-header">

                <button class="accordion-button collapsed"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#q3">

                    Can I book a test drive?

                </button>

            </h2>

            <div id="q3"
                 class="accordion-collapse collapse"
                 data-bs-parent="#faqBox">

                <div class="accordion-body">

                    Yes, free test drive booking is available.

                </div>

            </div>

        </div>



        <!-- QUESTION 4 -->

        <div class="accordion-item">

            <h2 class="accordion-header">

                <button class="accordion-button collapsed"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#q4">

                    Do you provide EMI options?

                </button>

            </h2>

            <div id="q4"
                 class="accordion-collapse collapse"
                 data-bs-parent="#faqBox">

                <div class="accordion-body">

                    Yes, easy EMI options are available.

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
