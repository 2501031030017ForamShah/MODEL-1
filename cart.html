<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cars - Car World</title>

  <!-- CSS -->

  <link rel="stylesheet" href="style.css">

</head>

<body>


  <!-- HEADER -->

  <div id="header"></div>

  <script src="header.js"></script>



  <!-- CAR PAGE -->

  <section class="gallery">

    <h2>

      Our Car Collection

    </h2>


    <div class="car-container" id="cart-items-container">
      <!-- Cart items will be rendered here dynamically via cart.js -->
    </div>



    <!-- BUTTONS -->

    <div class="load-more-box">
      <button id="cartBtn" onclick="checkout()" style="background: green;">
        Checkout 🛒
      </button>
      <button id="clearBtn" onclick="clearCart()" style="background: darkred;">
        Clear Cart ❌
      </button>
    </div>

  </section>



  <!-- FOOTER -->

  <div id="footer"></div>

  <script src="footer.js"></script>



  <!-- JAVASCRIPT -->
  <script src="cart.js"></script>
  <script>
    function checkout() {
      let cart = getCart();
      if (cart.length > 0) {
        alert("Proceeding to checkout with " + cart.length + " items!");
        // window.location.href = "pymant.html";
      } else {
        alert("Your cart is empty!");
      }
    }

    function clearCart() {
      saveCart([]);
      renderCart();
    }
  </script>

</body>

</html>
